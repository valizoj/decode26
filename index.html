<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>decode26</title>

<style>
*{
    box-sizing:border-box;
    margin:0;
    padding:0;
}

body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    background:#f5f7fb;
    color:#222;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:flex-start;
    padding:12px;
}

.container{
    width:100%;
    max-width:560px;
    background:white;
    border-radius:18px;
    padding:16px;
    box-shadow:0 8px 25px rgba(0,0,0,0.08);
}

h1{
    text-align:center;
    color:#2563eb;
    font-size:1.8rem;
    margin-bottom:12px;
}

.mode-group{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    justify-content:center;
    margin-bottom:12px;
    font-size:0.95rem;
}

.mode-group label{
    cursor:pointer;
    user-select:none;
}

.problem{
    text-align:center;
    font-size:2rem;
    font-weight:700;
    letter-spacing:2px;
    margin-top:8px;
}

.message{
    text-align:center;
    min-height:28px;
    margin-top:6px;
    font-size:1.1rem;
    font-weight:600;
}

.hint{
    text-align:center;
    color:#777;
    font-size:1.2rem;
    letter-spacing:6px;
    margin:8px 0;
}

input[type="text"]{
    width:100%;
    padding:12px;
    font-size:1.2rem;
    border:1px solid #ccc;
    border-radius:12px;
    outline:none;
}

input[type="text"]:focus{
    border-color:#2563eb;
}

.stats{
    margin-top:12px;
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:12px;
    font-size:0.9rem;
    color:#555;
}

.stats span{
    white-space:nowrap;
}

.correct{
    color:#16a34a;
}

.incorrect{
    color:#dc2626;
}

@media (max-width:600px){

    body{
        padding:8px;
    }

    .container{
        padding:12px;
    }

    .problem{
        font-size:1.5rem;
    }

    .hint{
        font-size:1rem;
        letter-spacing:4px;
    }

    .stats{
        font-size:0.8rem;
        gap:8px;
    }
}
</style>
</head>

<body>

<div class="container">

<h1>decode26</h1>

<div class="mode-group">
<label><input type="radio" name="mode" value="1"> 1文字</label>
<label><input type="radio" name="mode" value="3" checked> 3文字</label>
<label><input type="radio" name="mode" value="4"> 4文字</label>
<label><input type="radio" name="mode" value="5"> 5文字</label>
<label><input type="radio" name="mode" value="random"> ランダム</label>
</div>

<div class="problem" id="problem"></div>

<div class="message" id="message"></div>

<div class="hint" id="hint"></div>

<input
type="text"
id="answer"
placeholder="英単語を入力してEnter"
autocomplete="off"
autocapitalize="off"
spellcheck="false"
>

<div class="stats">
<span id="currentTime">今回 -</span>
<span id="averageTime">平均 -</span>
<span id="bestTime">Best -</span>
<span id="streak">連続 0</span>
</div>

</div>

<script>

const words = {

1:[
"a","b","c","d","e","f","g","h","i","j",
"k","l","m","n","o","p","q","r","s","t",
"u","v","w","x","y","z"
],

3:[
"cat","dog","car","bus","pen","cup","bag","sun","sky","sea",
"map","key","hat","box","egg","fan","bed","toy","jam","ice"
],

4:[
"book","tree","fish","door","milk","cake","bird","star","moon","rain",
"rock","ship","desk","ring","lion","wolf","road","bank","sand","park"
],

5:[
"apple","pizza","hotel","music","phone","tiger","water","radio","beach","bread",
"cloud","train","horse","table","river","light","movie","dream","tower","heart"
]

};

let currentWord = "";
let previousWord = "";

let startTime = 0;

let streak = 0;
let bestTime = null;
let recentTimes = [];

function wordToNumbers(word){

    return word
        .toUpperCase()
        .split("")
        .map(c => c.charCodeAt(0)-64)
        .join(" ");

}

function getMode(){

    return document.querySelector(
        'input[name="mode"]:checked'
    ).value;

}

function chooseWord(){

    let mode = getMode();
    let list;

    if(mode === "random"){

        const lengths = [3,4,5];

        const selected =
            lengths[Math.floor(
                Math.random()*lengths.length
            )];

        list = words[selected];

    }else{

        list = words[Number(mode)];

    }

    let candidate;

    do{

        candidate =
            list[Math.floor(
                Math.random()*list.length
            )];

    }while(
        list.length > 1 &&
        candidate === previousWord
    );

    previousWord = candidate;

    return candidate;

}

function startQuestion(){

    currentWord = chooseWord();

    document.getElementById("problem").textContent =
        wordToNumbers(currentWord);

    document.getElementById("hint").textContent =
        "_ ".repeat(currentWord.length);

    document.getElementById("message").textContent = "";

    document.getElementById("answer").value = "";

    startTime = performance.now();

    setTimeout(() => {
        document.getElementById("answer").focus();
    }, 50);

}

function updateStats(time){

    document.getElementById("currentTime").textContent =
        "今回 " + time.toFixed(1) + "秒";

    if(bestTime === null || time < bestTime){

        bestTime = time;

    }

    document.getElementById("bestTime").textContent =
        "Best " + bestTime.toFixed(1) + "秒";

    recentTimes.push(time);

    if(recentTimes.length > 10){

        recentTimes.shift();

    }

    const avg =
        recentTimes.reduce(
            (a,b)=>a+b,0
        ) / recentTimes.length;

    document.getElementById("averageTime").textContent =
        "平均 " + avg.toFixed(1) + "秒";

    document.getElementById("streak").textContent =
        "連続 " + streak;

}

function submitAnswer(){

    const answer =
        document.getElementById("answer")
        .value
        .trim()
        .toLowerCase();

    if(answer === "") return;

    const elapsed =
        (performance.now() - startTime) / 1000;

    const msg =
        document.getElementById("message");

    if(answer === currentWord){

        streak++;

        msg.className = "message correct";

        msg.textContent =
            "⭕ " +
            currentWord.toUpperCase() +
            " (" +
            elapsed.toFixed(1) +
            "秒)";

        updateStats(elapsed);

    }else{

        streak = 0;

        msg.className = "message incorrect";

        msg.textContent =
            "❌ " +
            currentWord.toUpperCase();

        document.getElementById("streak").textContent =
            "連続 0";

    }

    setTimeout(
        startQuestion,
        800
    );

}

document
.getElementById("answer")
.addEventListener(
    "keydown",
    e => {

        if(e.key === "Enter"){

            submitAnswer();

        }

    }
);

document
.querySelectorAll(
    'input[name="mode"]'
)
.forEach(r => {

    r.addEventListener(
        "change",
        startQuestion
    );

});

startQuestion();

</script>

</body>
</html>
